<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="QuestLog">
<meta name="theme-color" content="#F2EAD8">
<title>QuestLog</title>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IM+Fell+English+SC&display=swap');
:root {
  --p:  #F2EAD8; --pd: #E8D9B8; --pp: #EDE0C4;
  --ink: #1C1208; --im: #2A1A06;
  --br: #8B6030; --bl: #C4A97A;
  --red: #8B3020; --grn: #3A6B2A;
  --mu: #5C3D1A; --di: #8B7355;
  --sat: env(safe-area-inset-top,0px);
  --sab: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--p);font-family:'Crimson Pro',Georgia,serif;color:var(--ink)}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--sat)}

/* topbar */
#topbar{background:var(--pd);border-bottom:1.5px solid var(--br);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#app-title{font-family:'IM Fell English SC',serif;font-size:20px;color:var(--im)}
#scribe-label{font-size:12px;font-style:italic;color:var(--di);display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}

/* tabs */
#tabs{display:flex;background:var(--pp);border-bottom:1px solid var(--bl);flex-shrink:0}
.tab{flex:1;padding:10px 4px;text-align:center;font-family:'IM Fell English SC',serif;font-size:12px;letter-spacing:.04em;color:var(--di);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--im);border-bottom-color:var(--red)}

/* panels */
#panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;visibility:hidden}
.panel.on{visibility:visible}

/* ── CHAT ── */
#msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;background-image:repeating-linear-gradient(transparent,transparent 27px,#C4A97A33 27px,#C4A97A33 28px);background-size:100% 28px}
.m{max-width:88%}.m.ai{align-self:flex-start}.m.me{align-self:flex-end}
.ms{font-family:'IM Fell English SC',serif;font-size:10px;letter-spacing:.07em;color:var(--br);margin-bottom:3px;padding:0 2px}
.m.me .ms{text-align:right;color:var(--di)}
.mb{padding:9px 13px;font-size:15px;line-height:1.55;border-radius:2px}
.m.ai .mb{background:var(--pd);border:1px solid var(--bl);border-top-left-radius:0}
.m.me .mb{background:var(--im);color:var(--p);border-top-right-radius:0}
.thinking{display:flex;gap:4px;padding:10px 13px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--di);animation:pu 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pu{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* chips */
#chips{padding:8px 12px 6px;display:flex;gap:6px;overflow-x:auto;border-top:.5px solid var(--bl);background:var(--pp);flex-shrink:0;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{font-family:'Crimson Pro',serif;font-size:13px;font-style:italic;padding:4px 11px;border:1px solid var(--br);color:var(--mu);border-radius:2px;background:var(--p);white-space:nowrap;cursor:pointer;flex-shrink:0}

/* input */
#irow{display:flex;gap:8px;padding:10px 12px;padding-bottom:calc(10px + var(--sab));border-top:1px solid var(--br);background:var(--pd);align-items:flex-end;flex-shrink:0}
#inp{flex:1;font-family:'Crimson Pro',serif;font-size:15px;background:var(--p);border:1px solid var(--br);color:var(--ink);padding:8px 11px;border-radius:2px;resize:none;min-height:40px;max-height:110px;outline:none;line-height:1.5;-webkit-appearance:none}
#inp::placeholder{color:var(--di);font-style:italic}
#sbtn{width:40px;height:40px;background:var(--im);border:none;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sbtn svg{width:16px;height:16px;stroke:var(--p);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── LEDGER ── */
#ledger-panel{background:var(--p)}
.ph{padding:12px 14px 8px;border-bottom:1px solid var(--bl);background:var(--pp);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.pl{font-family:'IM Fell English SC',serif;font-size:11px;letter-spacing:.1em;color:var(--br)}
#tlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ti{padding:11px 14px;border-bottom:.5px solid var(--bl);display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.tc{width:18px;height:18px;border:1.5px solid var(--br);border-radius:2px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.tc.dn{background:var(--im);border-color:var(--im)}
.tc.dn::after{content:'✓';font-size:11px;color:var(--p)}
.tn{font-size:15px;color:var(--ink);line-height:1.3}
.tn.dn{text-decoration:line-through;color:var(--di)}
.tm{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap}
.tg{font-size:11px;font-style:italic;color:var(--di)}
.tg.urg{color:var(--red)}
.empty{padding:40px 20px;text-align:center;font-size:14px;font-style:italic;color:var(--di);line-height:1.7}

/* ── SOMEDAY ── */
#someday-panel{background:var(--p)}
#slist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.si{padding:12px 14px;border-bottom:.5px solid var(--bl)}
.sb{font-family:'IM Fell English SC',serif;font-size:9px;letter-spacing:.06em;color:var(--red);margin-bottom:2px}
.sn{font-size:15px;color:var(--ink)}

/* ── SETTINGS ── */
#settings-panel{background:var(--p);overflow-y:auto;-webkit-overflow-scrolling:touch}
.ss{padding:16px 16px 8px;border-bottom:.5px solid var(--bl)}
.sl{font-family:'IM Fell English SC',serif;font-size:10px;letter-spacing:.1em;color:var(--br);margin-bottom:10px}
.sr{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.sr label{font-size:13px;font-style:italic;color:var(--mu)}
.sr input,.sr textarea{font-family:'Crimson Pro',serif;font-size:14px;background:var(--pd);border:1px solid var(--bl);color:var(--ink);padding:8px 10px;border-radius:2px;outline:none;width:100%;-webkit-appearance:none}
.sn2{font-size:12px;font-style:italic;color:var(--di);line-height:1.5;margin-top:4px}
.svbtn{width:100%;padding:11px;font-family:'IM Fell English SC',serif;font-size:13px;letter-spacing:.05em;background:var(--im);color:var(--p);border:none;border-radius:2px;cursor:pointer;margin-top:4px}

/* ── ONBOARDING ── */
#ob{position:fixed;inset:0;background:var(--p);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;padding-top:calc(32px + var(--sat));padding-bottom:calc(32px + var(--sab));z-index:100}
#ob.h{display:none}
.oo{font-size:11px;color:var(--bl);letter-spacing:4px;margin-bottom:16px}
.ot{font-family:'IM Fell English SC',serif;font-size:28px;color:var(--im);text-align:center;margin-bottom:6px}
.os{font-size:15px;font-style:italic;color:var(--mu);text-align:center;margin-bottom:24px;line-height:1.6}
.or{width:80px;height:1px;background:var(--bl);margin:0 auto 20px}
.of{width:100%;max-width:380px;margin-bottom:16px}
.of label{display:block;font-family:'IM Fell English SC',serif;font-size:11px;letter-spacing:.08em;color:var(--br);margin-bottom:5px}
.of input,.of textarea{width:100%;font-family:'Crimson Pro',serif;font-size:16px;background:var(--pd);border:1px solid var(--br);color:var(--ink);padding:10px 12px;border-radius:2px;outline:none;-webkit-appearance:none}
.of textarea{resize:none;min-height:72px;line-height:1.5}
.of input::placeholder,.of textarea::placeholder{color:var(--di);font-style:italic}
.obtn{width:100%;max-width:380px;padding:13px;font-family:'IM Fell English SC',serif;font-size:14px;letter-spacing:.06em;background:var(--im);color:var(--p);border:none;border-radius:2px;cursor:pointer}
</style>
</head>
<body>

<div id="ob">
  <div class="oo">✦ · ✦ · ✦</div>
  <div class="ot">QuestLog</div>
  <div class="os">Your personal companion.<br>Let us begin with one question.</div>
  <div class="or"></div>
  <div class="of"><label>Your name</label><input id="ob1" type="text" placeholder="What shall I call you?" autocomplete="off" autocorrect="off"></div>
  <div class="of"><label>Name your Scribe</label><input id="ob2" type="text" placeholder="Give your companion a name…" autocomplete="off" autocorrect="off"></div>
  <div class="of"><label>One thing rattling around in your head</label><textarea id="ob3" placeholder="Something you haven't dealt with yet…" rows="3"></textarea></div>
  <button class="obtn" onclick="finishOb()">Begin the Chronicle ✦</button>
</div>

<div id="app">
  <div id="topbar">
    <div id="app-title">✦ QuestLog</div>
    <div id="scribe-label"><div class="sdot"></div><span id="sname">The Scribe</span></div>
  </div>
  <div id="tabs">
    <button class="tab on" onclick="goTab('chat',this)">The Scribe</button>
    <button class="tab" onclick="goTab('ledger',this)">Ledger</button>
    <button class="tab" onclick="goTab('someday',this)">Someday</button>
    <button class="tab" onclick="goTab('settings',this)">Settings</button>
  </div>
  <div id="panels">

    <div class="panel on" id="chat-panel">
      <div id="msgs"></div>
      <div id="chips">
        <div class="chip" onclick="fill('I have 20 minutes and low energy — what should I do?')">20 min, low energy</div>
        <div class="chip" onclick="fill('What is most urgent right now?')">what\'s urgent?</div>
        <div class="chip" onclick="fill('I need to do a brain dump')">brain dump</div>
        <div class="chip" onclick="fill('Break down my biggest task into steps')">break it down</div>
      </div>
      <div id="irow">
        <textarea id="inp" placeholder="Speak your mind…" rows="1" oninput="rsz(this)" onkeydown="kd(event)"></textarea>
        <button id="sbtn" onclick="send()" aria-label="Send"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>

    <div class="panel" id="ledger-panel">
      <div class="ph"><div class="pl">Your Ledger</div></div>
      <div id="tlist"></div>
    </div>

    <div class="panel" id="someday-panel">
      <div class="ph"><div class="pl">The Someday Space</div></div>
      <div id="slist"></div>
    </div>

    <div class="panel" id="settings-panel">
      <div class="ss">
        <div class="sl">Your Details</div>
        <div class="sr"><label>Your name</label><input type="text" id="s1" autocomplete="off"></div>
        <div class="sr"><label>Scribe name</label><input type="text" id="s2" autocomplete="off"></div>
      </div>
      <div class="ss">
        <div class="sl">AI Connection</div>
        <div class="sr"><label>Anthropic API key</label><input type="password" id="s3" placeholder="sk-ant-…" autocomplete="off" spellcheck="false"></div>
        <div class="sn2">Stored on your device only. Never shared.</div>
      </div>
      <div class="ss">
        <div class="sl">Supabase</div>
        <div class="sr"><label>Project URL</label><input type="text" id="s4" autocorrect="off" spellcheck="false"></div>
        <div class="sr"><label>Anon key</label><input type="password" id="s5" autocomplete="off" spellcheck="false"></div>
      </div>
      <div class="ss"><button class="svbtn" onclick="saveCfg()">Save Settings</button></div>
    </div>

  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const SB_URL = "https://vsuaozczglydhxtxuero.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdWFvemN6Z2x5ZGh4dHh1ZXJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzM1MzgsImV4cCI6MjA5NzkwOTUzOH0.FZNeVE9A8Kae7FYn6lkejxKngbSub1zqHyoFG2F7v8M";

let C = {
  name: '', scribe: 'the Scribe', apiKey: '', sbUrl: SB_URL, sbKey: SB_KEY
};

function lsGet(k, def) { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } }
function lsSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

function loadCfg() {
  const s = lsGet('ql_cfg', {});
  C = { ...C, ...s };
  if (!C.sbUrl) C.sbUrl = SB_URL;
  if (!C.sbKey) C.sbKey = SB_KEY;
}

function saveCfg() {
  C.name  = document.getElementById('s1').value.trim();
  C.scribe = document.getElementById('s2').value.trim() || 'the Scribe';
  C.apiKey = document.getElementById('s3').value.trim();
  C.sbUrl  = document.getElementById('s4').value.trim().replace(/\/$/, '') || SB_URL;
  C.sbKey  = document.getElementById('s5').value.trim() || SB_KEY;
  lsSet('ql_cfg', C);
  document.getElementById('sname').textContent = C.scribe;
  alert('Saved.');
}

function fillSettings() {
  document.getElementById('s1').value = C.name;
  document.getElementById('s2').value = C.scribe;
  document.getElementById('s3').value = C.apiKey;
  document.getElementById('s4').value = C.sbUrl;
  document.getElementById('s5').value = C.sbKey;
}

// ── Supabase ───────────────────────────────────────────────────────────────
function sbH() {
  return { 'apikey': C.sbKey, 'Authorization': 'Bearer ' + C.sbKey, 'Content-Type': 'application/json', 'Accept': 'application/json', 'Prefer': 'return=representation' };
}

async function dbGet() {
  const r = await fetch(C.sbUrl + '/rest/v1/tasks?order=created_at.asc', { headers: sbH() });
  console.log('dbGet status', r.status);
  if (!r.ok) { console.log('dbGet error', await r.text()); return []; }
  return await r.json();
}

async function dbInsert(row) {
  const payload = { name: row.name, energy: row.energy||'medium', minutes: row.minutes||15, done: !!row.done, urgent: !!row.urgent, tier: row.tier||'task', someday: !!row.someday, notes: row.notes||null };
  const r = await fetch(C.sbUrl + '/rest/v1/tasks', { method: 'POST', headers: sbH(), body: JSON.stringify(payload) });
  console.log('dbInsert status', r.status, row.name);
  const txt = await r.text();
  if (!r.ok) { console.log('dbInsert error', txt); return null; }
  return JSON.parse(txt)[0] || null;
}

async function dbPatch(id, updates) {
  const r = await fetch(C.sbUrl + '/rest/v1/tasks?id=eq.' + id, { method: 'PATCH', headers: sbH(), body: JSON.stringify(updates) });
  console.log('dbPatch status', r.status);
}

// ── State ──────────────────────────────────────────────────────────────────
let tasks = [];
let somedays = [];
let history = [];

async function loadAll() {
  const rows = await dbGet();
  tasks    = rows.filter(r => !r.someday);
  somedays = rows.filter(r =>  r.someday);
  console.log('tasks:', tasks.length, 'somedays:', somedays.length);
  renderTasks();
  renderSomeday();
}

// ── Render ─────────────────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTasks() {
  const el = document.getElementById('tlist');
  if (!tasks.length) { el.innerHTML = '<div class="empty">No tasks yet.<br>Tell the Scribe what\'s on your mind.</div>'; return; }
  el.innerHTML = tasks.map(t => `
    <div class="ti" onclick="toggle('${t.id}')">
      <div class="tc ${t.done?'dn':''}"></div>
      <div>
        <div class="tn ${t.done?'dn':''}">${t.urgent&&!t.done?'⚡ ':''}${esc(t.name)}</div>
        <div class="tm">
          ${t.energy?`<span class="tg ${t.energy==='high'?'urg':''}">${t.energy} energy</span>`:''}
          ${t.minutes?`<span class="tg">~${t.minutes} min</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

function renderSomeday() {
  const el = document.getElementById('slist');
  if (!somedays.length) { el.innerHTML = '<div class="empty">Your Someday Space is empty.<br>Dreams and shelved projects live here.</div>'; return; }
  el.innerHTML = somedays.map(t => `
    <div class="si">
      <div class="sb">· Someday ·</div>
      <div class="sn">${esc(t.name)}</div>
    </div>`).join('');
}

async function toggle(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  renderTasks();
  await dbPatch(id, { done: t.done });
  if (t.done) addAI(`${esc(t.name)} — marked complete. A small deed, but real.`);
}

// ── Chat ───────────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'm ' + (role === 'me' ? 'me' : 'ai');
  const who = role === 'me' ? (C.name||'You') : (C.scribe||'The Scribe');
  d.innerHTML = `<div class="ms">${esc(who)}</div><div class="mb">${text.replace(/\n/g,'<br>')}</div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function addAI(t) { addMsg('ai', t); }

function showThinking() {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'm ai'; d.id = 'th';
  d.innerHTML = `<div class="ms">${esc(C.scribe||'The Scribe')}</div><div class="mb"><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function sysPrompt() {
  const tl = tasks.filter(t=>!t.done).map(t=>`- ${t.name} (${t.energy||'medium'} energy, ${t.minutes||'?'} min${t.urgent?', URGENT':''})`).join('\n') || 'No active tasks.';
  return `You are ${C.scribe||'the Scribe'}, a warm, honest, witty personal companion for ${C.name||'the user'}. Help them manage their life through natural conversation.

Personality: warm not saccharine, dry wit, honest, speaks sparingly and with purpose, slightly literary but always clear.

Current tasks:
${tl}

Respond ONLY with valid JSON — no markdown, no extra text:
{"message":"your reply","tasks":[{"name":"","energy":"low|medium|high","minutes":15,"done":false,"urgent":false,"tier":"task|project|epic","someday":false}],"completedNames":["name of completed task if user said they finished one"]}

Rules:
- Return complete updated task list every time
- someday:true for dreams, far-future wishes, shelved big projects
- If user asks what to do, pick ONE task decisively
- Keep message ADHD-friendly — brief, warm, no bullet walls
- Never invent tasks the user did not mention`;
}

async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('me', txt);
  history.push({ role: 'user', content: txt });
  showThinking();

  if (!C.apiKey) {
    document.getElementById('th')?.remove();
    addAI("The Scribe's quill is dry — add your Anthropic API key in Settings.");
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': C.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: sysPrompt(), messages: history })
    });
    const data = await res.json();
    document.getElementById('th')?.remove();
    if (data.error) { addAI('Error: ' + data.error.message); return; }

    const raw = data.content?.[0]?.text || '{}';
    history.push({ role: 'assistant', content: raw });

    let p;
    try { p = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e) { addAI(raw); return; }

    if (p.message) addAI(p.message);

    if (Array.isArray(p.tasks)) {
      for (const pt of p.tasks) {
        if (pt.someday) {
          const exists = somedays.some(s => s.name.toLowerCase() === pt.name.toLowerCase());
          if (!exists) {
            const row = await dbInsert({ ...pt, someday: true });
            if (row) somedays.push(row);
          }
        } else {
          const exists = tasks.some(t => t.name.toLowerCase() === pt.name.toLowerCase());
          if (!exists) {
            const row = await dbInsert({ ...pt, someday: false });
            if (row) tasks.push(row);
          }
        }
      }
      if (Array.isArray(p.completedNames)) {
        for (const n of p.completedNames) {
          const t = tasks.find(x => x.name.toLowerCase().includes(n.toLowerCase()));
          if (t && !t.done) { t.done = true; if (t.id) await dbPatch(t.id, { done: true }); }
        }
      }
      renderTasks();
      renderSomeday();
    }
  } catch(e) {
    document.getElementById('th')?.remove();
    addAI('Something went wrong. Try again.');
    console.log('send error', e);
  }
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function goTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById(name + '-panel').classList.add('on');
  if (name === 'ledger' || name === 'someday') loadAll();
}

// ── Onboarding ─────────────────────────────────────────────────────────────
function finishOb() {
  const name   = document.getElementById('ob1').value.trim();
  const scribe = document.getElementById('ob2').value.trim() || 'Aldric';
  const first  = document.getElementById('ob3').value.trim();
  if (!name) { document.getElementById('ob1').focus(); return; }
  C.name = name; C.scribe = scribe;
  lsSet('ql_cfg', C);
  lsSet('ql_ob', 1);
  document.getElementById('ob').classList.add('h');
  document.getElementById('sname').textContent = C.scribe;
  fillSettings();
  addAI(`Well met, ${esc(C.name)}. I am ${esc(C.scribe)} — your Scribe, your companion. Tell me what is on your mind and we shall begin.`);
  if (first) setTimeout(() => { document.getElementById('inp').value = first; send(); }, 600);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fill(t) { const i = document.getElementById('inp'); i.value = t; i.focus(); rsz(i); }
function rsz(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }
function kd(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

// ── Init ───────────────────────────────────────────────────────────────────
loadCfg();
fillSettings();
if (lsGet('ql_ob', 0)) {
  document.getElementById('ob').classList.add('h');
  document.getElementById('sname').textContent = C.scribe;
  addAI(`Welcome back, ${esc(C.name||'adventurer')}. What needs attending to today?`);
  loadAll();
}
</script>
</body>
</html>
